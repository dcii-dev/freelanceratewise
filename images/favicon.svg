<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    @media (prefers-color-scheme: light) { :root { --c: #0d9488; } }
    @media (prefers-color-scheme: dark) { :root { --c: #2dd4bf; } }
  </style>
  <!-- Growth bars: ascending left to right (each 4w, 1.5 gap) -->
  <rect x="0" y="24" width="4" height="8" rx="1.5" fill="var(--c)" opacity="0.35"/>
  <rect x="5.5" y="19" width="4" height="13" rx="1.5" fill="var(--c)" opacity="0.6"/>
  <rect x="11" y="14" width="4" height="18" rx="1.5" fill="var(--c)" opacity="0.9"/>
  <!-- Calculator body (1.5 gap from bar3 right edge at 15) -->
  <rect x="16.5" y="3" width="15" height="29" rx="2.5" stroke="var(--c)" stroke-width="1.75"/>
  <!-- Display strip -->
  <rect x="18.25" y="5" width="11.5" height="5.5" rx="1" fill="var(--c)" opacity="0.2"/>
  <!-- Button row 1 -->
  <rect x="18.25" y="14" width="5" height="3" rx="0.75" fill="var(--c)" opacity="0.45"/>
  <rect x="24.75" y="14" width="5" height="3" rx="0.75" fill="var(--c)" opacity="0.45"/>
  <!-- Button row 2 -->
  <rect x="18.25" y="19" width="5" height="3" rx="0.75" fill="var(--c)" opacity="0.45"/>
  <rect x="24.75" y="19" width="5" height="3" rx="0.75" fill="var(--c)" opacity="0.45"/>
  <!-- Button row 3 -->
  <rect x="18.25" y="24" width="5" height="3" rx="0.75" fill="var(--c)" opacity="0.45"/>
  <rect x="24.75" y="24" width="5" height="3" rx="0.75" fill="var(--c)" opacity="0.45"/>
</svg>
